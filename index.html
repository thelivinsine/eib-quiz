    <style>
        /* Design tokens — Neon Velocity */
        :root {
            --bg:       #050505;
            --surface:  rgba(255,255,255,0.03);
            --surface2: rgba(255,255,255,0.06);
            --border:   rgba(255,255,255,0.08);
            --border-hover: rgba(191,255,0,0.35);

            --lime:      #BFFF00;
            --lime-glow: rgba(191,255,0,0.25);
            --lime-dim:  rgba(191,255,0,0.08);

            /* legacy aliases so JS colour refs still resolve */
            --gold:     #BFFF00;
            --gold-dim: rgba(191,255,0,0.7);
            --blue:     #BFFF00;

            --red:   #ff4d4d;
            --green: #39d98a;

            --text:     #ffffff;
            --muted:    rgba(255,255,255,0.58);
            --sub-text: rgba(255,255,255,0.65);

            --radius:      14px;
            --radius-sm:   8px;
            --radius-pill: 9999px;

            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;

            --font-head: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Geist Mono', monospace;
            --font-body: 'Plus Jakarta Sans', sans-serif;

            --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html.light {
            --bg:       #f0f0eb;
            --surface:  rgba(0,0,0,0.06);
            --surface2: rgba(0,0,0,0.10);
            --border:   rgba(0,0,0,0.16);
            --border-hover: rgba(60,130,0,0.55);

            --lime:      #3d8c00;
            --lime-glow: rgba(60,130,0,0.28);
            --lime-dim:  rgba(60,130,0,0.14);

            --gold:     #3d8c00;
            --gold-dim: rgba(60,130,0,0.7);
            --blue:     #3d8c00;

            --red:   #cc2222;
            --green: #1a8a55;

            --text:     #0a0a0a;
            --muted:    rgba(0,0,0,0.62);
            --sub-text: rgba(0,0,0,0.72);
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s var(--ease-spring), color 0.3s var(--ease-spring);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Noise grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 9998;
        }

        /* Ambient lime glow bloom */
        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw;
            height: 90vw;
            background: radial-gradient(circle, rgba(191,255,0,0.1) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        html.light body::after {
            background: radial-gradient(circle, rgba(60,130,0,0.06) 0%, transparent 65%);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-head);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: var(--spacing-lg);
            letter-spacing: -0.02em;
        }

        h1 { font-size: clamp(1.4rem, 3vw, 2rem); }
        h2 { font-size: clamp(1.05rem, 2vw, 1.3rem); }
        h3 { font-size: 1rem; }
        button, a { transition: all 0.2s var(--ease-spring); }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        /* Header */
        header {
            background: rgba(5,5,5,0.82);
            border-bottom: 1px solid var(--border);
            padding: 12px var(--spacing-lg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
        }
        html.light header {
            background: rgba(240,240,235,0.85);
        }

        .header-content {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .header-text h1 {
            font-family: var(--font-head);
            font-weight: 800;
            font-size: clamp(0.85rem, 2vw, 1rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0;
            color: var(--text);
        }

        .header-text p {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Theme toggle — compact pill */
        .theme-toggle {
            display: flex;
            align-items: center;
            background: var(--surface2);
            border-radius: var(--radius-pill);
            padding: 2px;
            user-select: none;
            border: 1px solid var(--border);
            gap: 1px;
        }

        .theme-toggle-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: var(--radius-pill);
            font-family: var(--font-mono);
            font-size: 0.58rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: background-color 0.25s var(--ease-spring), color 0.25s;
            color: var(--muted);
            line-height: 1;
        }

        .theme-toggle-btn.active {
            background: var(--lime);
            color: #000;
            box-shadow: 0 0 8px var(--lime-glow);
        }

        /* Main content */
        main {
            max-width: 860px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        /* Screen management */
        .screen {
            display: none;
            animation: fadeUp 0.5s var(--ease-spring);
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mode cards — Luminosity Cards */
        .modes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
            margin: var(--spacing-xl) 0;
        }

        .mode-card {
            background: radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 60%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-lg);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.5s var(--ease-spring),
                        background 0.5s var(--ease-spring),
                        transform 0.3s var(--ease-spring),
                        box-shadow 0.5s var(--ease-spring);
        }

        .mode-card:hover {
            border-color: var(--border-hover);
            background: radial-gradient(circle at top left, var(--lime-dim), transparent 60%);
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(191,255,0,0.08);
        }

        .mode-icon {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--lime);
            margin-bottom: var(--spacing-lg);
            display: block;
        }

        .mode-card h3 {
            font-size: 1.1rem;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.01em;
        }

        .mode-description {
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: var(--spacing-lg);
            line-height: 1.5;
        }

        .mode-badge {
            display: inline-block;
            padding: 6px var(--spacing-md);
            border-radius: var(--radius-pill);
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .badge-gold  { background: var(--lime); color: #000; box-shadow: 0 0 12px var(--lime-glow); }
        .badge-green { background: var(--green); color: #000; }
        .badge-red   { background: var(--red); color: #fff; }

        /* Quiz screen */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: var(--spacing-md);
            position: sticky;
            top: 64px;
            z-index: 50;
            background: var(--bg);
            padding: 4px 0 6px;
        }
        html.light .stats-bar { background: #f0f0eb; }

        .stat-card {
            background: rgba(5,5,5,0.8);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        html.light .stat-card {
            background: rgba(240,240,235,0.85);
        }

        .stat-label {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 600;
            color: var(--lime);
            font-variant-numeric: tabular-nums;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: var(--spacing-md);
        }
        html.light .progress-bar {
            background: rgba(0,0,0,0.14);
        }

        .progress-fill {
            height: 100%;
            background: var(--lime);
            box-shadow: 0 0 8px var(--lime-glow);
            transition: width 0.4s var(--ease-spring);
            width: 0%;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ---- Quiz two-column layout ---- */
        .quiz-layout {
            display: block;
            position: relative;
        }

        .quiz-main {
            margin-right: calc(196px + var(--spacing-lg));
        }

        .quiz-sidebar {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            width: 196px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-header {
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--lime);
            margin-bottom: 4px;
        }

        .sidebar-chevron {
            display: none;
            font-size: 0.6rem;
            color: var(--muted);
            transition: transform 0.2s ease;
            margin-bottom: 4px;
        }

        .sidebar-chevron.open {
            transform: rotate(180deg);
        }

        .sidebar-count {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .sidebar-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .sidebar-progress {
            height: 3px;
            background: var(--surface2);
            border-radius: 2px;
            overflow: hidden;
        }

        .sidebar-progress-fill {
            height: 100%;
            background: var(--lime);
            width: 0%;
            transition: width 0.4s var(--ease-spring);
            box-shadow: 0 0 6px var(--lime-glow);
        }

        @media (max-width: 720px) {
            .quiz-layout { display: flex; flex-direction: column; }
            .quiz-main { margin-right: 0; }
            .quiz-sidebar {
                width: 100%;
                position: relative;
                top: 0;
                max-height: none;
                height: auto !important;
                overflow: visible;
            }
            .sidebar-header {
                cursor: pointer;
                user-select: none;
                padding-bottom: 8px;
            }
            .sidebar-chevron { display: inline; }
            .sidebar-body {
                display: none;
                max-height: 200px;
                overflow-y: auto;
            }
            .sidebar-body.expanded { display: flex; }
        }

        /* Question card — glassmorphism */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(14px, 2.5vw, 22px);
            margin-bottom: var(--spacing-lg);
            backdrop-filter: blur(12px);
            transition: border-color 0.3s var(--ease-spring);
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }

        .question-num {
            background: var(--lime);
            color: #000;
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            box-shadow: 0 0 10px var(--lime-glow);
        }

        .question-category {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .bilingual-toggle {
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--lime);
            padding: 5px var(--spacing-md);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: background 0.25s var(--ease-spring), box-shadow 0.25s var(--ease-spring);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .bilingual-toggle:hover {
            background: var(--lime-dim);
            box-shadow: 0 0 14px var(--lime-glow);
        }

        .bilingual-toggle.active {
            background: var(--lime-dim);
        }

        .question-text {
            font-family: var(--font-head);
            font-weight: 700;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: var(--spacing-lg);
            line-height: 1.4;
            letter-spacing: -0.01em;
        }

        .question-image {
            max-width: 100%;
            max-height: 300px;
            margin: var(--spacing-lg) 0;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .question-english {
            display: none;
            background: var(--surface2);
            border-left: 3px solid var(--lime);
            padding: var(--spacing-lg);
            margin: var(--spacing-lg) 0;
            border-radius: var(--radius-sm);
            font-style: italic;
            color: var(--sub-text);
        }

        .question-english.show {
            display: block;
        }

        .options {
            display: grid;
            gap: 10px;
            margin-bottom: var(--spacing-lg);
        }

        .option-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 14px;
            min-height: 44px;
            display: flex;
            align-items: center;
            border-radius: var(--radius-sm);
            text-align: left;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
            transition: border-color 0.25s var(--ease-spring),
                        background 0.25s var(--ease-spring),
                        box-shadow 0.25s var(--ease-spring);
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            background: var(--lime-dim);
            box-shadow: 0 0 16px rgba(191,255,0,0.06);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            border-color: var(--green);
            border-left: 4px solid var(--green);
            background: rgba(57,217,138,0.15);
        }

        .option-btn:not(.option-btn--image).correct::before {
            content: '✓';
            color: var(--green);
            font-weight: 700;
            font-size: 1rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .option-btn.incorrect {
            border-color: var(--red);
            border-left: 4px solid var(--red);
            background: rgba(255,77,77,0.15);
        }

        .option-btn:not(.option-btn--image).incorrect::before {
            content: '✗';
            color: var(--red);
            font-weight: 700;
            font-size: 1rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        /* Letter label on text option buttons */
        .opt-letter {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--lime);
            margin-right: 10px;
            flex-shrink: 0;
            opacity: 0.85;
            letter-spacing: 0.05em;
        }
        .option-btn.correct .opt-letter { color: var(--green); opacity: 1; }
        .option-btn.incorrect .opt-letter { color: var(--red); opacity: 1; }

        /* Wrapper that stacks German text + English sub-text vertically */
        .opt-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* English sub-text inside text option buttons — mirrors .question-english style */
        .option-en-text {
            display: none;
            font-style: italic;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--sub-text);
            margin-top: 8px;
            padding-top: 7px;
            border-top: 1px solid var(--border);
            line-height: 1.5;
            width: 100%;
        }
        .option-en-text.show { display: block; }

        /* Image-option layout: 2x2 grid of buttons containing SVG visuals */
        .options.options--image {
            grid-template-columns: 1fr 1fr;
        }
        .option-btn--image {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            text-align: center;
            padding: var(--spacing-md);
            min-height: 140px;
        }
        .option-btn--image .opt-num {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            opacity: 0.75;
        }
        .option-btn--image .opt-img {
            width: 100%;
            max-width: 160px;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: var(--radius-sm);
            padding: 8px;
            overflow: hidden;
        }
        .option-btn--image .opt-img svg,
        .option-btn--image .opt-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .option-btn--image.img-missing .opt-img {
            background: var(--surface2);
        }
        .option-btn--image.img-missing .opt-img img { display: none; }
        .option-btn--image.img-missing .opt-img::after {
            content: 'Bild fehlt';
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* Explanation */
        .explanation {
            display: none;
            margin-top: var(--spacing-lg);
            padding: var(--spacing-lg);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--green);
        }

        .explanation.correct {
            background: rgba(57,217,138,0.07);
            border-left-color: var(--green);
        }

        .explanation.incorrect {
            background: rgba(255,77,77,0.07);
            border-left-color: var(--red);
        }

        .explanation.show {
            display: block;
        }

        .explanation-header {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: var(--spacing-sm);
        }

        .explanation-text {
            margin-bottom: var(--spacing-md);
        }

        .explanation-english {
            display: none;
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border);
            font-style: italic;
            color: var(--sub-text);
            font-size: 0.95rem;
        }

        .explanation-english.show {
            display: block;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
            flex-wrap: wrap;
            align-items: center;
        }
        /* Deterministic quiz-button layout on every screen width:
           Zurück + Beenden on the left, Weiter (primary) pushed to the right. */
        #backBtn { order: 1; }
        #quitBtn { order: 2; }
        #nextBtn { order: 3; margin-left: auto; }

        button {
            font-family: var(--font-mono);
            font-weight: 600;
            border: none;
            border-radius: var(--radius-pill);
            padding: 10px var(--spacing-lg);
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Laser Button */
        .btn-primary {
            position: relative;
            overflow: hidden;
            background: var(--lime);
            color: #000;
            box-shadow: 0 0 20px var(--lime-glow);
            transition: box-shadow 0.3s var(--ease-spring),
                        transform 0.2s var(--ease-spring);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45) 50%, transparent);
            transform: skewX(-20deg);
            transition: left 0.6s var(--ease-spring);
        }

        .btn-primary:hover::before { left: 150%; }

        .btn-primary:hover {
            box-shadow: 0 0 36px var(--lime-glow);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-primary:disabled::before { display: none; }

        /* Ghost Button */
        .btn-secondary {
            background: transparent;
            color: var(--lime);
            border: 1px solid var(--border-hover);
            transition: background 0.25s var(--ease-spring),
                        box-shadow 0.25s var(--ease-spring);
        }

        .btn-secondary:hover {
            background: var(--lime-dim);
            box-shadow: 0 0 14px var(--lime-glow);
        }

        /* End screen */
        .end-screen {
            text-align: center;
        }

        .score-display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-xl);
            margin: var(--spacing-xl) auto;
            backdrop-filter: blur(12px);
            max-width: 480px;
        }

        .score-number {
            font-family: var(--font-head);
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            color: var(--lime);
            margin-bottom: var(--spacing-md);
            letter-spacing: -0.04em;
            text-shadow: 0 0 40px var(--lime-glow);
            font-variant-numeric: tabular-nums;
        }

        .score-text {
            font-size: 1.1rem;
            color: var(--sub-text);
            margin-bottom: var(--spacing-lg);
        }

        .pass-fail {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: var(--radius-pill);
            margin-bottom: var(--spacing-lg);
        }

        .pass-fail.pass {
            color: var(--green);
            border: 1px solid var(--green);
            background: rgba(57,217,138,0.08);
        }

        .pass-fail.fail {
            color: var(--red);
            border: 1px solid var(--red);
            background: rgba(255,77,77,0.08);
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            margin: var(--spacing-2xl) 0;
        }

        .breakdown-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-lg);
        }

        .breakdown-label {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: var(--spacing-sm);
        }

        .breakdown-number {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Timer */
        .timer {
            position: sticky;
            top: 64px;
            background: rgba(5,5,5,0.85);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: center;
            z-index: 50;
            min-width: 110px;
            backdrop-filter: blur(12px);
        }
        html.light .timer {
            background: rgba(240,240,235,0.9);
        }

        .timer.danger {
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255,77,77,0.15);
        }

        .timer-label {
            font-family: var(--font-mono);
            color: var(--muted);
            font-size: 0.62rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .timer-display {
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-weight: 600;
            color: var(--lime);
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .timer.danger .timer-display {
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 10px var(--spacing-lg);
            }

            .header-content {
                flex-direction: row;
                justify-content: space-between;
                gap: var(--spacing-sm);
            }

            .header-text p {
                display: none;
            }

            .stats-bar {
                top: 58px;
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 6px 0 4px;
            }

            .stat-card {
                padding: 6px var(--spacing-sm);
            }

            .stat-label {
                font-size: 0.58rem;
            }

            .stat-value {
                font-size: 1.05rem;
            }

            .modes-grid {
                grid-template-columns: 1fr;
            }

            .score-breakdown {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 500px) {
            main {
                padding: var(--spacing-lg);
            }

            .question-card {
                padding: var(--spacing-lg);
            }

            .options.options--image {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 400px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
                top: 50px;
            }
            .stat-label { font-size: 0.55rem; }
        }

        /* Accessibility */
        button:focus-visible {
            outline: 2px solid var(--lime);
            outline-offset: 3px;
        }

        a:focus-visible {
            outline: 2px solid var(--lime);
            outline-offset: 2px;
        }

        .option-btn:focus-visible {
            outline: 2px solid var(--lime);
            outline-offset: -2px;
        }

        /* ---- Keyboard hint strip ---- */
        .keyboard-hint {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 8px var(--spacing-lg);
            margin-top: var(--spacing-md);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            color: var(--muted);
            animation: fadeUp 0.3s var(--ease-spring);
            backdrop-filter: blur(10px);
        }

        .keyboard-hint-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
            font-family: inherit;
            text-transform: none;
            letter-spacing: 0;
        }

        .keyboard-hint-close:hover {
            color: var(--text);
        }

        kbd {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-bottom-width: 2px;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 0.82em;
            font-family: var(--font-mono);
            color: var(--lime);
        }

        /* ---- Pacing indicator ---- */
        .pacing-info {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ---- Mode card start button ---- */
        .mode-start-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: var(--spacing-md);
            padding: 8px var(--spacing-lg);
            border-radius: var(--radius-pill);
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            pointer-events: none;
            transition: border-color 0.3s var(--ease-spring), color 0.3s var(--ease-spring), background 0.3s var(--ease-spring);
        }
        .mode-card:hover .mode-start-btn {
            border-color: var(--lime);
            color: var(--lime);
            background: var(--lime-dim);
        }

        /* ---- Mode card extras ---- */
        .mode-time-est {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin: var(--spacing-sm) 0;
            text-transform: uppercase;
        }

        .mode-pips {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: var(--spacing-sm) 0;
        }

        .mode-pip {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
        }

        .mode-pip.filled {
            background: var(--lime);
            box-shadow: 0 0 6px var(--lime-glow);
        }

        /* ---- Wrong-answer review section ---- */
        .review-section {
            margin-top: var(--spacing-2xl);
            text-align: left;
        }

        .review-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }

        .review-section-header h2 {
            color: var(--red);
            margin-bottom: 0;
        }

        .review-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--red);
            border-radius: var(--radius-sm);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            backdrop-filter: blur(8px);
        }

        .review-q-num {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .review-q-text {
            font-family: var(--font-head);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: var(--spacing-md);
            line-height: 1.4;
        }

        .review-answers {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: var(--spacing-md);
        }

        .review-answer {
            padding: 8px var(--spacing-md);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .review-answer.user-wrong {
            background: rgba(255,77,77,0.08);
            border: 1px solid rgba(255,77,77,0.3);
            color: var(--red);
        }

        .review-answer.correct-ans {
            background: rgba(57,217,138,0.08);
            border: 1px solid rgba(57,217,138,0.3);
            color: var(--green);
        }

        .review-explanation {
            font-size: 0.85rem;
            color: var(--sub-text);
            border-top: 1px solid var(--border);
            padding-top: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .review-explanation-en {
            font-size: 0.82rem;
            color: var(--muted);
            font-style: italic;
            margin-top: 4px;
        }

        /* ---- Exam sub-scores ---- */
        .exam-subscores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: var(--spacing-md);
            margin: var(--spacing-xl) 0;
        }

        .pass-threshold-note {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 6px var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            display: inline-block;
        }

        @media (max-width: 500px) {
            .exam-subscores {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* ---- Question navigator ---- */
        .nav-toggle-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            gap: var(--spacing-md);
            user-select: none;
            backdrop-filter: blur(10px);
            transition: border-color 0.25s var(--ease-spring);
        }

        .nav-toggle-bar:hover {
            border-color: var(--border-hover);
        }

        .nav-toggle-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .nav-progress-summary {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
        }

        .nav-chevron {
            color: var(--muted);
            font-size: 0.7rem;
            transition: transform 0.2s var(--ease-spring);
        }

        .nav-chevron.open {
            transform: rotate(180deg);
        }

        .question-nav-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            backdrop-filter: blur(10px);
        }

        .question-nav-legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 8px;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .legend-swatch {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }

        .question-nav-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .q-nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--muted);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s var(--ease-spring),
                        background 0.15s var(--ease-spring),
                        transform 0.15s var(--ease-spring);
            font-family: var(--font-mono);
            padding: 0;
            flex-shrink: 0;
        }

        .q-nav-btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
            transform: scale(1.12);
        }

        .q-nav-btn.qnav-current {
            border-color: var(--lime);
            background: var(--lime-dim);
            color: var(--lime);
            font-weight: 700;
            box-shadow: 0 0 8px var(--lime-glow);
        }

        .q-nav-btn.qnav-correct {
            border-color: var(--green);
            background: rgba(57,217,138,0.1);
            color: var(--green);
        }

        .q-nav-btn.qnav-incorrect {
            border-color: var(--red);
            background: rgba(255,77,77,0.1);
            color: var(--red);
        }

        @media (max-width: 500px) {
            .q-nav-btn {
                width: 26px;
                height: 26px;
                font-size: 0.6rem;
            }
        }

        /* ---- Scroll-reveal ---- */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mode-card {
            animation: revealUp 0.6s var(--ease-spring) both;
        }
        .mode-card:nth-child(1) { animation-delay: 0.05s; }
        .mode-card:nth-child(2) { animation-delay: 0.12s; }
        .mode-card:nth-child(3) { animation-delay: 0.19s; }

        .question-card {
            animation: revealUp 0.5s var(--ease-spring) both;
        }

        /* ---- Hero border box ---- */
        .hero-border-box {
            border: 3px solid var(--lime);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: var(--spacing-xl);
            text-align: center;
            animation: revealUp 0.5s var(--ease-spring) both;
            position: relative;
        }

        .hero-border-box::before {
            content: 'DE / EN · BERLIN · 3 LERNMODI';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg);
            padding: 0 var(--spacing-md);
            font-family: var(--font-mono);
            font-size: 0.62rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--lime);
            white-space: nowrap;
        }

        .hero-border-box h2 {
            font-family: var(--font-head);
            font-weight: 800;
            font-size: clamp(1.3rem, 3.5vw, 2.2rem);
            letter-spacing: -0.03em;
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 0;
        }

        .hero-border-box .hero-sub {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: var(--spacing-md);
        }

        @media (max-width: 600px) {
            .hero-border-box {
                border-width: 4px;
                padding: var(--spacing-lg) var(--spacing-lg);
            }
        }

        /* ---- Main container z-index fix (above body::after glow) ---- */
        main {
            position: relative;
            z-index: 1;
        }

        /* ---- Home: practice by topic ---- */
        .topic-section { margin-top: var(--spacing-2xl); }
        .topic-heading {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: var(--spacing-md);
        }
        .topic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
        }
        .topic-chip {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            text-align: left;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            cursor: pointer;
            color: var(--text);
            transition: border-color 0.3s var(--ease-spring), transform 0.2s var(--ease-spring), background 0.3s var(--ease-spring);
        }
        .topic-chip:hover {
            border-color: var(--border-hover);
            background: var(--lime-dim);
            transform: translateY(-2px);
        }
        .topic-chip-icon { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
        .topic-chip-body { display: flex; flex-direction: column; min-width: 0; }
        .topic-chip-name { font-weight: 700; font-size: 0.95rem; }
        .topic-chip-meta {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.04em;
            color: var(--muted);
            margin-top: 2px;
        }
        @media (max-width: 560px) {
            .topic-grid { grid-template-columns: 1fr; }
        }

        /* ---- Question header actions (TTS + bilingual) ---- */
        .question-meta-actions { display: flex; align-items: center; gap: var(--spacing-sm); }
        .speak-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            cursor: pointer;
            padding: 4px 10px;
            font-size: 0.85rem;
            line-height: 1;
            color: var(--text);
            transition: border-color 0.2s var(--ease-spring), background 0.2s;
        }
        .speak-btn:hover { border-color: var(--border-hover); background: var(--lime-dim); }

        /* ---- Home: results history ---- */
        .history-section { margin-top: var(--spacing-2xl); }
        .hist-exam {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }
        .hist-exam-stats {
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: var(--spacing-sm);
            font-size: 0.85rem; color: var(--sub-text); margin-bottom: var(--spacing-md);
        }
        .hist-exam-stats strong { color: var(--text); }
        .hist-bars { display: flex; align-items: flex-end; gap: 4px; height: 52px; }
        .hist-bar { width: 14px; border-radius: 3px 3px 0 0; display: inline-block; }
        .hist-bar.pass { background: var(--green); }
        .hist-bar.fail { background: var(--red); }
        .hist-list { display: flex; flex-direction: column; gap: 6px; }
        .hist-row {
            display: flex; align-items: center; gap: var(--spacing-md); flex-wrap: wrap;
            font-size: 0.82rem; color: var(--sub-text);
            padding: 8px var(--spacing-md);
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
        }
        .hist-mode { font-weight: 700; color: var(--text); }
        .hist-date { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); }
        .hist-score { margin-left: auto; font-family: var(--font-mono); }
        .hist-badge { font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; border-radius: var(--radius-pill); }
        .hist-badge.pass { background: rgba(57,217,138,0.15); color: var(--green); }
        .hist-badge.fail { background: rgba(255,77,77,0.15); color: var(--red); }

        /* ---- Home: glossary ---- */
        .glossary-section { margin-top: var(--spacing-2xl); }
        .glossary-wrap {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: var(--spacing-md) var(--spacing-lg);
        }
        .glossary-summary {
            cursor: pointer; font-weight: 700; font-size: 0.95rem; list-style: none;
        }
        .glossary-summary::-webkit-details-marker { display: none; }
        .gloss-list { margin-top: var(--spacing-md); display: flex; flex-direction: column; gap: 6px; }
        .gloss-item { border-top: 1px solid var(--border); padding-top: 8px; }
        .gloss-item summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--lime); list-style: none; }
        .gloss-item summary::-webkit-details-marker { display: none; }
        .gloss-def { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; font-size: 0.85rem; color: var(--sub-text); }
        .gloss-en { font-style: italic; color: var(--muted); }

        /* ---- Home: progress / readiness + resume ---- */
        .resume-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            background: var(--lime-dim);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius);
            padding: var(--spacing-md) var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }
        .resume-banner .resume-text { font-size: 0.9rem; color: var(--sub-text); }
        .resume-banner .resume-text strong { color: var(--text); }
        .resume-actions { display: flex; gap: var(--spacing-sm); }

        .progress-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }
        .progress-stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            text-align: center;
        }
        .progress-stat .ps-num {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--lime);
        }
        .progress-stat .ps-label {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
        }
        .progress-reset {
            display: block;
            margin: 0 auto var(--spacing-lg);
            background: none;
            border: none;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: underline;
        }
        .progress-reset:hover { color: var(--red); }
        @media (max-width: 520px) {
            .progress-panel { grid-template-columns: repeat(3, 1fr); gap: var(--spacing-sm); }
            .progress-stat { padding: var(--spacing-sm); }
            .progress-stat .ps-num { font-size: 1.1rem; }
        }

        /* ---- Accessibility: visible keyboard focus ---- */
        a:focus-visible,
        button:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid var(--lime);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        /* ---- Accessibility: respect reduced-motion ---- */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-text">
                <h1><button onclick="showScreen('home')" style="background:none;border:none;padding:0;cursor:pointer;font:inherit;color:inherit;letter-spacing:inherit;text-transform:inherit;">EIB</button></h1>
            </div>
            <div class="theme-toggle">
                <button class="theme-toggle-btn active" id="darkBtn" aria-label="Dark mode">Dark</button>
                <button class="theme-toggle-btn" id="lightBtn" aria-label="Light mode">Light</button>

    </header>

    <main>
        <!-- Home Screen -->
        <section id="homeScreen" class="screen active">

            <!-- Hero block -->
            <div class="hero-border-box">
                <h2>Einbürgerungstest<br>Berlin Quiz</h2>
                <p class="hero-sub">Staatsbürgerschaft · Citizenship · 2025</p>
            </div>

            <!-- Progress / readiness + resume (populated by JavaScript) -->
            <div id="homeStatus"></div>

            <!-- Mode Selection (primary CTA — above the fold) -->
            <div class="modes-grid" id="modesGrid">
                <!-- Populated by JavaScript -->
            </div>

            <!-- Practice by topic (populated by JavaScript) -->
            <div class="topic-section" id="topicSection"></div>

            <!-- Results history (populated by JavaScript) -->
            <div class="history-section" id="historySection"></div>

            <!-- Glossary (populated by JavaScript) -->
            <div class="glossary-section" id="glossarySection"></div>
        </section>

        <!-- Quiz Screen -->
        <section id="quizScreen" class="screen">
            <div class="stats-bar" id="statsBar">
                <!-- Populated by JavaScript -->
            </div>

            <div class="quiz-layout">
                <!-- Left column: question card (+ timer for exam mode) -->
                <div class="quiz-main">
                    <div id="timer" style="display: none; margin-bottom: var(--spacing-md);">
                        <div class="timer-label">Zeit</div>
                        <div class="timer-display" id="timerDisplay">60:00</div>

                    <div class="question-card">
                        <div class="question-meta">
                            <div>
                                <span class="question-num" id="questionNum"></span>
                                <span class="question-category" id="questionCategory"></span>
                            </div>
                            <div class="question-meta-actions">
                                <button class="speak-btn" id="speakBtn" title="Frage vorlesen" aria-label="Frage vorlesen">🔊</button>
                                <button class="bilingual-toggle" id="bilingualToggle">🌐 EN</button>
                            </div>
                        </div>

                        <div class="question-text" id="questionText" tabindex="-1"></div>
                        <div class="question-english" id="questionEnglish"></div>

                        <img id="questionImage" class="question-image" style="display: none;">

                        <div id="answerHint" style="display:none; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-align: center; padding: var(--spacing-sm) 0; margin-top: 2px;">Wähle eine Antwort · Select an answer</div>

                <!-- Right column: vertical navigator sidebar -->
                <aside class="quiz-sidebar" id="questionNavWrapper" style="display: none;">
                    <div class="sidebar-header" id="sidebarToggle" role="button" aria-expanded="false">
                        <div class="sidebar-header-row">
                            <span class="sidebar-title">🗺 Fragen-Übersicht</span>
                            <span class="sidebar-chevron" id="sidebarChevron">▼</span>
                        </div>
                        <span class="sidebar-count" id="navProgressSummary"></span>
                    </div>
                    <div class="sidebar-body" id="sidebarBody">
                        <div class="progress-bar" style="margin-bottom: 4px;">
                            <div class="progress-fill" id="progressFill"></div>

                            <span id="progressLeft"></span>

                        <div class="question-nav-legend">
                            <span><span class="legend-swatch" style="background:var(--gold);"></span>Aktuell</span>
                            <span><span class="legend-swatch" style="background:var(--green);"></span>Richtig</span>
                            <span><span class="legend-swatch" style="background:var(--red);"></span>Falsch</span>
                            <span><span class="legend-swatch" style="background:var(--border);"></span>Offen</span>

        </section>

        <!-- End Screen -->
        <section id="endScreen" class="screen">
            <div class="end-screen">
                <h1 id="endTitle">Prüfung beendet! 🎉</h1>

                <div class="score-display">
                    <div class="score-number" id="finalScore"></div>
                    <div class="score-text" id="scoreMessage"></div>
                    <div class="pass-fail" id="passFail"></div>
                </div>

                <div class="score-breakdown">
                    <div class="breakdown-item">
                        <div class="breakdown-label">Richtig beantwortet</div>
                        <div class="breakdown-number" id="correctCount"></div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-label">Falsch beantwortet</div>
                        <div class="breakdown-number" id="incorrectCount"></div>
                    </div>
                </div>

                <div id="examSubScores" style="display: none;"></div>

                <div class="btn-group" style="justify-content: center; margin-top: var(--spacing-2xl);">
                    <button class="btn-primary" id="restartBtn">Nochmal</button>
                    <button class="btn-secondary" id="homeBtn">Zurück</button>
                </div>

                <div id="reviewSection"></div>
            </div>
        </section>
    </main>

    <script>
        // ============================================================
        // DATA: 320 questions with translations and explanations (310 general + 10 Berlin)
        // ------------------------------------------------------------
        // Numbering note: IDs run contiguously Q1–Q320 and use this app's
        // internal numbering, NOT the official BAMF Gesamtfragenkatalog
        // sequence. Q1–Q310 are general (`berlin: false`); Q311–Q320 are
        // Berlin-specific (`berlin: true`).
        //
        // The official BAMF general pool contains 300 questions; Q301–Q310
        // here are genuine BAMF questions (Die Linke founding, national
        // anthem author, Personalausweis, Montagsdemonstration, Stunde
        // Null, etc.) that carry different official catalogue numbers.
        // Treat IDs as app-local identifiers, not BAMF refs.
        //
        // Questions Q21, Q130, Q209, Q226, Q311, Q318 carry an
        // `option_images` array of inline SVGs rendered as visual answer
        // choices.
        // ============================================================
        let QUESTIONS = []; // loaded from questions.json (see loadQuestions)

        // Topic categories (key -> bilingual label + icon). Must match tools/categorize.js.
        const CATEGORIES = {
            rights:   { de: 'Grundrechte & Verfassung',          en: 'Fundamental Rights & Constitution', icon: '⚖️' },
            politics: { de: 'Demokratie, Wahlen & Staat',        en: 'Democracy, Elections & State',      icon: '🗳️' },
            history:  { de: 'Geschichte',                        en: 'History',                           icon: '📜' },
            society:  { de: 'Gesellschaft, Soziales & Wirtschaft', en: 'Society, Welfare & Economy',       icon: '🤝' },
            symbols:  { de: 'Symbole, Geografie & Europa',       en: 'Symbols, Geography & Europe',       icon: '🦅' },
            berlin:   { de: 'Berlin',                            en: 'Berlin',                            icon: '🏙️' },
        };

        // ============================================================
        // APPLICATION STATE
        // ============================================================
        let state = {
            currentScreen: 'home',
            currentMode: null,
            currentQuestionIndex: 0,
            currentQuestions: [],
            answered: [],
            correct: 0,
            incorrect: 0,
            showEnglish: false,
            showExplanation: false,
            timerInterval: null,
            timeLeft: 3600,
            themeDark: true,
            missedQuestions: [],   // {q, userAnswerIdx} for wrong-answer review
            examStartTime: null,   // Date.now() when exam begins
            generalCorrect: 0,     // correct non-berlin answers (exam sub-score)
            berlinCorrect: 0,      // correct berlin answers (exam sub-score)
            answered: {}           // overridden below; kept here for shape reference
        };

        // ============================================================
        // PERSISTENT PROGRESS + SPACED REPETITION (Leitner)
        // ============================================================
        const PROGRESS_KEY = 'eib_progress_v1';
        const SESSION_KEY  = 'eib_session_v1';
        const MAX_BOX = 5;
        const DAY_MS  = 86400000;
        const BOX_INTERVALS = [0, 1, 3, 7, 16, 35]; // days until due, index = box 1..5

        // { [id]: { seen, correct, wrong, streak, lastSeen, box, due } }
        let progress = {};

        function loadProgress() {
            try {
                const raw = localStorage.getItem(PROGRESS_KEY);
                progress = raw ? JSON.parse(raw) : {};
            } catch (e) { progress = {}; }
            if (!progress || typeof progress !== 'object') progress = {};
        }
        function saveProgress() {
            try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch (e) {}
        }
        function recordAnswer(q, isCorrect) {
            const now = Date.now();
            const r = progress[q.id] || { seen: 0, correct: 0, wrong: 0, streak: 0, lastSeen: 0, box: 1, due: 0 };
            r.seen++;
            r.lastSeen = now;
            if (isCorrect) {
                r.correct++;
                r.streak = (r.streak || 0) + 1;
                r.box = Math.min(MAX_BOX, (r.box || 1) + 1);
            } else {
                r.wrong++;
                r.streak = 0;
                r.box = 1;
            }
            r.due = now + BOX_INTERVALS[r.box] * DAY_MS;
            progress[q.id] = r;
            saveProgress();
        }
        function masteredCount() {
            return Object.values(progress).filter(r => (r.box || 1) >= 4).length;
        }
        function overallAccuracy() {
            let c = 0, t = 0;
            for (const r of Object.values(progress)) { c += r.correct || 0; t += (r.correct || 0) + (r.wrong || 0); }
            return t ? Math.round(c / t * 100) : 0;
        }
        // Smart Review queue: due (weakest box first), then unseen, then nearest-due — capped.
        function buildReviewQueue(limit = 25) {
            const pool = QUESTIONS.filter(q => !q.appExtra);
            const now = Date.now();
            const due = pool.filter(q => progress[q.id] && progress[q.id].due <= now)
                .sort((a, b) => (progress[a.id].box - progress[b.id].box) || (progress[a.id].due - progress[b.id].due));
            const unseen = pool.filter(q => !progress[q.id]);
            const queue = [...due, ...unseen];
            if (queue.length < limit) {
                const rest = pool.filter(q => progress[q.id] && progress[q.id].due > now)
                    .sort((a, b) => progress[a.id].box - progress[b.id].box);
                queue.push(...rest);
            }
            return queue.slice(0, limit);
        }
        function reviewDueCount() {
            const now = Date.now();
            return QUESTIONS.filter(q => !q.appExtra && progress[q.id] && progress[q.id].due <= now).length;
        }
        function clearProgress() {
            progress = {};
            history = [];
            try {
                localStorage.removeItem(PROGRESS_KEY);
                localStorage.removeItem(SESSION_KEY);
                localStorage.removeItem(HISTORY_KEY);
            } catch (e) {}
        }

        // ---- results history ----
        const HISTORY_KEY = 'eib_history_v1';
        let history = [];
        function loadHistory() {
            try { const raw = localStorage.getItem(HISTORY_KEY); history = raw ? JSON.parse(raw) : []; }
            catch (e) { history = []; }
            if (!Array.isArray(history)) history = [];
        }
        function recordResult(entry) {
            history.push(entry);
            if (history.length > 50) history = history.slice(-50);
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
        }

        // ---- in-progress session resume (non-exam modes) ----
        function saveSession() {
            if (state.currentMode === 'exam' || state.currentMode === 'mistakes' || !state.currentQuestions.length) return;
            try {
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    mode: state.currentMode,
                    topic: state.currentTopic || null,
                    ids: state.currentQuestions.map(q => q.id),
                    idx: state.currentQuestionIndex,
                    answered: state.answered,
                    correct: state.correct,
                    incorrect: state.incorrect,
                    ts: Date.now()
                }));
            } catch (e) {}
        }
        function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch (e) {} }
        function getSavedSession() {
            try { const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; }
            catch (e) { return null; }
        }

        // ============================================================
        // THEME MANAGEMENT
        // ============================================================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        }

        function setTheme(theme) {
            if (theme === 'light') {
                document.documentElement.classList.add('light');
                state.themeDark = false;
                document.getElementById('darkBtn').classList.remove('active');
                document.getElementById('lightBtn').classList.add('active');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.remove('light');
                state.themeDark = true;
                document.getElementById('darkBtn').classList.add('active');
                document.getElementById('lightBtn').classList.remove('active');
                localStorage.setItem('theme', 'dark');
            }
        }

        // ============================================================
        // SCREEN MANAGEMENT
        // ============================================================
        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName + 'Screen').classList.add('active');
            state.currentScreen = screenName;
        }

        // ============================================================
        // HOME SCREEN
        // ============================================================
        function initHomeScreen() {
            renderModes();
            renderTopics();
            renderHistory();
            renderGlossary();
            renderHomeStatus();
        }

        // Verified pool used everywhere (excludes unverified appExtra questions).
        function pool() { return QUESTIONS.filter(q => !q.appExtra); }

        function renderTopics() {
            const el = document.getElementById('topicSection');
            if (!el) return;
            const all = pool();
            const chips = Object.entries(CATEGORIES).map(([key, meta]) => {
                const qs = all.filter(q => q.category === key);
                if (!qs.length) return '';
                const mastered = qs.filter(q => progress[q.id] && (progress[q.id].box || 1) >= 4).length;
                return `
                    <button class="topic-chip" onclick="startTopic('${key}')">
                        <span class="topic-chip-icon">${meta.icon}</span>
                        <span class="topic-chip-body">
                            <span class="topic-chip-name">${meta.de}</span>
                            <span class="topic-chip-meta">${qs.length} Fragen · ${mastered} gemeistert</span>
                        </span>
                    </button>`;
            }).join('');
            el.innerHTML = `
                <div class="topic-heading">Nach Thema üben</div>
                <div class="topic-grid">${chips}</div>`;
        }

        function startTopic(catKey) {
            const qs = pool().filter(q => q.category === catKey);
            if (!qs.length) return;
            state.currentMode = 'topic';
            state.currentTopic = catKey;
            state.currentQuestionIndex = 0;
            state.answered = {};
            state.correct = 0;
            state.incorrect = 0;
            state.showExplanation = false;
            state.missedQuestions = [];
            state.examStartTime = null;
            state.generalCorrect = 0;
            state.berlinCorrect = 0;
            state.currentQuestions = qs;
            clearSession();
            document.getElementById('questionNavWrapper').style.display = 'flex';
            document.getElementById('timer').style.display = 'none';
            showScreen('quiz');
            displayQuestion();
        }

        // ============================================================
        // RESULTS HISTORY (home)
        // ============================================================
        function renderHistory() {
            const el = document.getElementById('historySection');
            if (!el) return;
            if (!history.length) { el.innerHTML = ''; return; }

            const exams = history.filter(h => h.mode === 'exam');
            let examBlock = '';
            if (exams.length) {
                const passed = exams.filter(h => h.passed).length;
                const best = Math.max(...exams.map(h => h.percent));
                const bars = exams.slice(-12).map(h => {
                    const ht = Math.max(8, Math.round(h.percent * 0.5)); // 0..50px
                    return `<span class="hist-bar ${h.passed ? 'pass' : 'fail'}" style="height:${ht}px" title="${h.percent}% – ${h.passed ? 'bestanden' : 'nicht bestanden'}"></span>`;
                }).join('');
                examBlock = `
                    <div class="hist-exam">
                        <div class="hist-exam-stats">
                            <span><strong>${passed}/${exams.length}</strong> Prüfungen bestanden</span>
                            <span>Bestleistung <strong>${best}%</strong></span>
                        </div>
                        <div class="hist-bars">${bars}</div>
                    </div>`;
            }

            const labels = { exam: '🎯 Prüfung', allQuestions: '📋 Alle Fragen', berlin: '🏙️ Berlin', review: '🔁 Review', topic: '📚 Thema', mistakes: '🔁 Fehler' };
            const rows = history.slice(-6).reverse().map(h => {
                const d = new Date(h.ts);
                const date = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ' ' +
                             d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                const badge = h.mode === 'exam' ? `<span class="hist-badge ${h.passed ? 'pass' : 'fail'}">${h.passed ? 'Bestanden' : 'Nicht bestanden'}</span>` : '';
                return `<div class="hist-row"><span class="hist-mode">${labels[h.mode] || h.mode}</span><span class="hist-date">${date}</span><span class="hist-score">${h.correct}/${h.total} · ${h.percent}%</span>${badge}</div>`;
            }).join('');

            el.innerHTML = `<div class="topic-heading">Verlauf</div>${examBlock}<div class="hist-list">${rows}</div>`;
        }

        // ============================================================
        // GLOSSARY (home) — key civic/legal terms, bilingual
        // ============================================================
        const GLOSSARY = [

            { term: 'Bundesrat', de: 'Vertretung der 16 Bundesländer auf Bundesebene.', en: 'Body representing the 16 federal states at the national level.' },

            { term: 'Opposition', de: 'Abgeordnete, die nicht zur Regierung gehören.', en: 'Members of parliament not part of the government.' },
            { term: 'Gewaltenteilung', de: 'Trennung in Legislative, Exekutive und Judikative.', en: 'Separation into legislative, executive and judicial powers.' },
            { term: 'Volkssouveränität', de: 'Alle Staatsgewalt geht vom Volke aus (Art. 20 GG).', en: 'All state power emanates from the people (Art. 20 Basic Law).' },
