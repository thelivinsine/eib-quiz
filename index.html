        function renderGlossary() {
            const el = document.getElementById('glossarySection');
            if (!el) return;
            const items = GLOSSARY.map(g => `
                <details class="gloss-item">
                    <summary>${g.term}</summary>
                    <div class="gloss-def"><span>${g.de}</span><span class="gloss-en">${g.en}</span></div>
                </details>`).join('');
            el.innerHTML = `
                <details class="glossary-wrap">
                    <summary class="glossary-summary">📖 Glossar — wichtige Begriffe (${GLOSSARY.length})</summary>
                    <div class="gloss-list">${items}</div>
                </details>`;
        }

        // ============================================================
        // TEXT-TO-SPEECH (German question read-aloud)
        // ============================================================
        const ttsSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;
        function speakQuestion() {
            if (!ttsSupported) return;
            const q = state.currentQuestions[state.currentQuestionIndex];
            if (!q) return;
            const synth = window.speechSynthesis;
            if (synth.speaking) { synth.cancel(); return; } // toggle off
            const parts = [q.de, ...q.options.filter(o => o && !/^img\//.test(o))];
            const utt = new SpeechSynthesisUtterance(parts.join('. '));
            utt.lang = 'de-DE';
            utt.rate = 0.95;
            const deVoice = synth.getVoices().find(v => v.lang && v.lang.startsWith('de'));
            if (deVoice) utt.voice = deVoice;
            synth.cancel();
            synth.speak(utt);
        }

        function renderHomeStatus() {
            const el = document.getElementById('homeStatus');
            if (!el) return;
            const totalPool = QUESTIONS.filter(q => !q.appExtra).length;
            const seen = Object.keys(progress).length;
            let html = '';

            // Resume banner (only if a saved in-progress session exists)
            const sess = getSavedSession();
            if (sess && Array.isArray(sess.ids) && sess.ids.length) {
                const labels = { allQuestions: 'Alle Fragen', berlin: 'Berlin-Modus', review: 'Smart Review' };
                const sessLabel = sess.mode === 'topic'
                    ? (CATEGORIES[sess.topic] ? CATEGORIES[sess.topic].de : 'Thema')
                    : (labels[sess.mode] || sess.mode);
                const answered = sess.answered ? Object.keys(sess.answered).length : 0;
                html += `
                    <div class="resume-banner">
                        <div class="resume-text">
                            ⏸ Sitzung fortsetzen — <strong>${sessLabel}</strong>,
                            ${answered}/${sess.ids.length} beantwortet
                        </div>
                        <div class="resume-actions">
                            <button class="btn-primary" onclick="resumeSession()" style="padding:8px 18px;font-size:0.75rem;">Fortsetzen →</button>
                            <button class="btn-secondary" onclick="clearSession(); renderHomeStatus();" style="padding:8px 14px;font-size:0.75rem;">Verwerfen</button>
                        </div>
                    </div>`;
            }

            // Progress panel (only once the user has answered something)
            if (seen > 0) {
                html += `
                    <div class="progress-panel">
                        <div class="progress-stat"><div class="ps-num">${masteredCount()}/${totalPool}</div><div class="ps-label">Gemeistert</div></div>
                        <div class="progress-stat"><div class="ps-num">${reviewDueCount()}</div><div class="ps-label">Fällig</div></div>
                        <div class="progress-stat"><div class="ps-num">${overallAccuracy()}%</div><div class="ps-label">Trefferquote</div></div>
                    </div>
                    <button class="progress-reset" onclick="if(confirm('Gesamten Lernfortschritt zurücksetzen?')){clearProgress();renderHomeStatus();renderModes();}">Fortschritt zurücksetzen</button>`;
            }

            el.innerHTML = html;
        }

        function resumeSession() {
            const sess = getSavedSession();
            if (!sess) return;
            const byId = new Map(QUESTIONS.map(q => [q.id, q]));
            const qs = sess.ids.map(id => byId.get(id)).filter(Boolean);
            if (!qs.length) { clearSession(); renderHomeStatus(); return; }
            state.currentMode = sess.mode;
            state.currentTopic = sess.topic || null;
            state.currentQuestions = qs;
            state.currentQuestionIndex = Math.min(sess.idx || 0, qs.length - 1);
            state.answered = sess.answered || {};
            state.correct = sess.correct || 0;
            state.incorrect = sess.incorrect || 0;
            state.showExplanation = false;
            state.missedQuestions = [];
            state.examStartTime = null;
            state.generalCorrect = 0;
            state.berlinCorrect = 0;
            document.getElementById('questionNavWrapper').style.display = 'flex';
            document.getElementById('timer').style.display = 'none';
            showScreen('quiz');
            displayQuestion();
        }

        function renderModes() {

            const pips = (filled, total) => Array.from({length: total}, (_, i) =>
                `<span class="mode-pip${i < filled ? ' filled' : ''}"></span>`).join('');
            grid.innerHTML = `
                <div class="mode-card" onclick="startMode('allQuestions')">
                    <div class="mode-icon">📋</div>
                    <h3>Alle Fragen</h3>
                    <div class="mode-description">Alle 300 allgemeinen Fragen der Reihe nach</div>
                    <div class="mode-time-est">⏱ ca. 60–90 Min</div>
                    <div class="mode-pips">${pips(2, 3)}</div>
                    <div class="mode-badge badge-gold">300 Fragen</div>
                    <div><span class="mode-start-btn">Starten →</span></div>
                </div>

                    <div class="mode-icon">🏙️</div>
                    <h3>Berlin-Modus</h3>
                    <div class="mode-description">Nur die 10 Berlin-spezifischen Fragen</div>
                    <div class="mode-time-est">⏱ ca. 5 Min</div>
                    <div class="mode-pips">${pips(1, 3)}</div>
                    <div class="mode-badge badge-green">10 Fragen</div>
                    <div><span class="mode-start-btn">Starten →</span></div>
                </div>

                    <div class="mode-pips">${pips(2, 3)}</div>
                    <div class="mode-badge badge-gold">${reviewDueCount() || 'bis zu 25'} ${reviewDueCount() ? 'fällig' : 'Fragen'}</div>

        // ============================================================
        // QUESTION NAVIGATOR
        // ============================================================
        function renderQuestionNav() {
            const total = state.currentQuestions.length;
            const answered = Object.keys(state.answered).length;
            document.getElementById('navProgressSummary').textContent =
                `${answered}/${total} beantwortet`;

            document.getElementById('questionNavGrid').innerHTML =
                Array.from({ length: total }, (_, i) => {
                    const ans = state.answered[i];
                    const isCurrent = i === state.currentQuestionIndex;
                    let cls = 'q-nav-btn';
                    if (isCurrent) {
                        cls += ' qnav-current';
                    } else if (ans !== undefined) {
                        cls += ans === state.currentQuestions[i].correct
                            ? ' qnav-correct' : ' qnav-incorrect';
                    }
                    return `<button class="${cls}" onclick="jumpToQuestion(${i})" title="Frage ${i + 1}">${i + 1}</button>`;
                }).join('');
        }

        function toggleQuestionNav() {} // sidebar is always open

        function jumpToQuestion(qIdx) {
            state.currentQuestionIndex = qIdx;
            displayQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function startMode(mode) {
            state.currentMode = mode;
            state.currentTopic = null;
            state.currentQuestionIndex = 0;
            state.answered = {};
            state.correct = 0;
            state.incorrect = 0;
            state.showExplanation = false;
            state.missedQuestions = [];
            state.examStartTime = null;
            state.generalCorrect = 0;
            state.berlinCorrect = 0;

            if (mode === 'allQuestions') {
                state.currentQuestions = QUESTIONS.filter(q => !q.berlin && !q.appExtra);
            } else if (mode === 'berlin') {
                state.currentQuestions = QUESTIONS.filter(q => q.berlin);
            } else if (mode === 'review') {
                state.currentQuestions = buildReviewQueue(25);
                if (!state.currentQuestions.length) {
                    alert('Noch nichts zu wiederholen — beantworte zuerst ein paar Fragen.');
                    return;
                }
            } else if (mode === 'exam') {
                const general = [...QUESTIONS.filter(q => !q.berlin && !q.appExtra)].sort(() => Math.random() - 0.5).slice(0, 30);
                const berlin = [...QUESTIONS.filter(q => q.berlin)].sort(() => Math.random() - 0.5).slice(0, 3);
                state.currentQuestions = [...general, ...berlin];
                state.examStartTime = Date.now();
                startTimer();
            }

            clearSession(); // committed to a fresh round — replace any prior resumable session

            // Show sidebar navigator in non-exam modes, hide in exam
            const navWrapper = document.getElementById('questionNavWrapper');
            navWrapper.style.display = mode === 'exam' ? 'none' : 'flex';

            // Always start with sidebar collapsed on mobile
            if (window.innerWidth <= 720) {
                const sidebarBody = document.getElementById('sidebarBody');
                const sidebarChevron = document.getElementById('sidebarChevron');
                const sidebarToggle = document.getElementById('sidebarToggle');
                if (sidebarBody) sidebarBody.classList.remove('expanded');
                if (sidebarChevron) sidebarChevron.classList.remove('open');
                if (sidebarToggle) sidebarToggle.setAttribute('aria-expanded', 'false');
            }

            showScreen('quiz');
            displayQuestion();
        }

        // ============================================================
        // QUIZ SCREEN
        // ============================================================
        let hintShown = false;

        function displayQuestion() {
            const q = state.currentQuestions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex + 1) / state.currentQuestions.length) * 100;

            // Update stats
            updateStats();
            updateProgress(progress);

            // Question content
            document.getElementById('questionNum').textContent = `Frage ${state.currentQuestionIndex + 1}`;
            document.getElementById('questionCategory').textContent =
                (q.category && CATEGORIES[q.category]) ? CATEGORIES[q.category].de : (q.berlin ? 'Berlin' : 'Allgemein');
            document.getElementById('questionText').textContent = q.de;
            document.getElementById('questionEnglish').innerHTML = `<div>${q.en}</div>`;
            document.getElementById('questionEnglish').classList.remove('show');

            if (q.image) {
                const qImg = document.getElementById('questionImage');
                qImg.src = q.image;
                qImg.alt = q.de;
                qImg.style.display = 'block';
            } else {
                document.getElementById('questionImage').style.display = 'none';
            }

            // Options
            const optionsContainer = document.getElementById('optionsContainer');
            const hasImages = Array.isArray(q.option_images) && q.option_images.length === q.options.length;
            optionsContainer.classList.toggle('options--image', hasImages);
            optionsContainer.innerHTML = q.options.map((opt, idx) => {
                if (hasImages) {
                    return `
                <button class="option-btn option-btn--image" onclick="selectAnswer(${idx})" id="option-${idx}" aria-label="${String.fromCharCode(65 + idx)}: ${opt}">
                    <span class="opt-img"><img src="${q.option_images[idx]}" alt="${opt}" loading="lazy" onerror="this.closest('.option-btn').classList.add('img-missing')"></span>
                    <span class="opt-num">${String.fromCharCode(65 + idx)} — ${opt}</span>
                </button>`;
                }
                const enText = q.options_en && q.options_en[idx] ? q.options_en[idx] : '';
                const enClass = enText && state.showEnglish ? ' show' : '';
                return `
                <button class="option-btn" onclick="selectAnswer(${idx})" id="option-${idx}">
                    <span class="opt-letter">${String.fromCharCode(65 + idx)}</span><span class="opt-text-wrap">${opt}${enText ? `<span class="option-en-text${enClass}">${enText}</span>` : ''}</span>
                </button>`;
            }).join('');

            // Keyboard hint (shown once per session, on first question only)
            const hintContainer = document.getElementById('keyboardHintContainer');
            if (!hintShown && state.currentQuestionIndex === 0) {
                hintShown = true;
                hintContainer.innerHTML = `
                    <div class="keyboard-hint" id="keyboardHint">
                        <kbd>↑</kbd><kbd>↓</kbd> navigieren &nbsp;
                        <kbd>Space</kbd> auswählen &nbsp;
                        <kbd>Enter</kbd> weiter
                        <button class="keyboard-hint-close" onclick="document.getElementById('keyboardHintContainer').innerHTML=''">×</button>
                    </div>`;
            } else {
                hintContainer.innerHTML = '';
            }

            // Bilingual toggle state
            const toggle = document.getElementById('bilingualToggle');
            toggle.textContent = state.showEnglish ? '🌐 DE' : '🌐 EN';
            toggle.title = state.showEnglish ? 'Englisch ausblenden' : 'Auf Englisch anzeigen';
            toggle.classList.toggle('active', state.showEnglish);
            document.getElementById('questionEnglish').classList.toggle('show', state.showEnglish);

            // Show back button when not on the first question
            const backBtn = document.getElementById('backBtn');
            backBtn.style.display = state.currentQuestionIndex > 0 ? 'block' : 'none';

            // Restore answered state if this question was already answered (via navigator jump)
            const prevAnswer = state.answered[state.currentQuestionIndex];
            if (prevAnswer !== undefined) {
                document.getElementById('answerHint').style.display = 'none';
                document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
                document.getElementById('option-' + q.correct).classList.add('correct');
                if (prevAnswer !== q.correct) {
                    document.getElementById('option-' + prevAnswer).classList.add('incorrect');
                }
                showExplanation(q, prevAnswer === q.correct);
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.style.display = 'block';
                nextBtn.textContent = state.currentQuestionIndex + 1 === state.currentQuestions.length
                    ? 'Abschließen' : 'Weiter →';
            } else {
                document.getElementById('explanation').classList.remove('show');
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('answerHint').style.display = 'block';
                // Focus question text (non-interactive) so Space can't accidentally select option A
                document.getElementById('questionText').focus({ preventScroll: true });
            }

            // Always update sidebar navigator
            renderQuestionNav();

            // Sync sidebar height to question column so they bottom-align
            requestAnimationFrame(() => {
                const main = document.querySelector('.quiz-main');
                const sidebar = document.getElementById('questionNavWrapper');
                if (main && sidebar && sidebar.style.display !== 'none') {
                    sidebar.style.height = main.offsetHeight + 'px';
                }
            });
        }

        function updateStats() {
            const total = state.currentQuestions.length;
            const score = total > 0 ? Math.round((state.correct / total) * 100) : 0;

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Frage</div>
                    <div class="stat-value">${state.currentQuestionIndex + 1}/${total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Richtig</div>
                    <div class="stat-value" style="color: var(--green)">${state.correct}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Falsch</div>
                    <div class="stat-value" style="color: var(--red)">${state.incorrect}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Score</div>
                    <div class="stat-value">${score}%</div>
                </div>
            `;
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressLeft').textContent = `Frage ${state.currentQuestionIndex + 1} von ${state.currentQuestions.length}`;
            document.getElementById('progressPercent').textContent = Math.round(percent) + '%';
        }

        function selectAnswer(idx) {
            const q = state.currentQuestions[state.currentQuestionIndex];
            state.answered[state.currentQuestionIndex] = idx;

            document.getElementById('answerHint').style.display = 'none';

            // Disable all buttons
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

            // Highlight correct/incorrect
            document.getElementById('option-' + q.correct).classList.add('correct');
            if (idx !== q.correct) {
                document.getElementById('option-' + idx).classList.add('incorrect');
            }

            // Update score and sub-scores
            if (idx === q.correct) {
                state.correct++;
                if (q.berlin) state.berlinCorrect++;
                else state.generalCorrect++;
            } else {
                state.incorrect++;
                state.missedQuestions.push({ q, userAnswerIdx: idx });
            }

            // Durable progress (spaced repetition) + resumable session
            recordAnswer(q, idx === q.correct);
            saveSession();

            // Show explanation
            showExplanation(q, idx === q.correct);

            // Show next button and scroll it into view
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = 'block';
            nextBtn.textContent = state.currentQuestionIndex + 1 === state.currentQuestions.length ? 'Abschließen' : 'Weiter →';
            setTimeout(() => document.getElementById('explanation').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
            setTimeout(() => nextBtn.focus(), 600);

            // Always refresh sidebar navigator
            renderQuestionNav();
        }

        function showExplanation(q, isCorrect) {
            const exp = document.getElementById('explanation');
            exp.classList.remove('correct', 'incorrect');
            exp.classList.add(isCorrect ? 'correct' : 'incorrect');
            exp.classList.add('show');

            document.getElementById('explanationHeader').textContent = isCorrect ? '✓ Richtig!' : '✗ Falsch';
            if (!isCorrect) {
                document.getElementById('explanationHeader').textContent += ' — Richtige Antwort: ' + q.options[q.correct];
            }

            document.getElementById('explanationText').textContent = q.explanation_de;
            document.getElementById('explanationEnglish').textContent = q.explanation_en;
            document.getElementById('explanationEnglish').classList.toggle('show', state.showEnglish);
        }

        // ============================================================
        // TIMER
        // ============================================================
        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.style.display = 'block';
            state.timeLeft = 3600; // 60 minutes

            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();

                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    endQuiz();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(state.timeLeft / 60);
            const secs = state.timeLeft % 60;
            const display = `${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('timerDisplay').textContent = display;

            const timerEl = document.getElementById('timer');
            if (state.timeLeft < 300) {
                timerEl.classList.add('danger');
            } else {
                timerEl.classList.remove('danger');
            }

            // Pacing indicator: show after first answer
            let pacingEl = document.getElementById('pacingInfo');
            if (!pacingEl) {
                pacingEl = document.createElement('div');
                pacingEl.id = 'pacingInfo';
                pacingEl.className = 'pacing-info';
                timerEl.appendChild(pacingEl);
            }
            const answered = state.currentQuestionIndex;
            if (answered > 0 && state.examStartTime) {
                const elapsed = (Date.now() - state.examStartTime) / 1000;
                const avgSec = elapsed / answered;
                const remaining = state.currentQuestions.length - answered;
                const projectedSec = avgSec * remaining;
                const bufferSec = state.timeLeft - projectedSec;
                const avgMin = (avgSec / 60).toFixed(1);
                if (bufferSec > 300) {
                    pacingEl.textContent = `⬤ ${avgMin} Min/Frage`;
                    pacingEl.style.color = 'var(--green)';
                } else if (bufferSec > 0) {
                    pacingEl.textContent = `⬤ ${avgMin} Min/Frage`;
                    pacingEl.style.color = 'var(--gold)';
                } else {
                    pacingEl.textContent = `⬤ ${avgMin} Min/Frage — zu langsam`;
                    pacingEl.style.color = 'var(--red)';
                }
            }
        }

        // ============================================================
        // END SCREEN
        // ============================================================
        function endQuiz() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            clearSession(); // round finished — no longer resumable

            const total = state.currentQuestions.length;
            const percent = Math.round((state.correct / total) * 100);
            const isExam = state.currentMode === 'exam';

            // Record this round in the results history.
            recordResult({
                ts: Date.now(),
                mode: state.currentMode,
                topic: state.currentTopic || null,
                correct: state.correct,
                total,
                percent,
                passed: isExam ? state.correct >= 17 : null
            });

            const titles = {
                exam:         'Prüfungssimulation beendet! 🎯',
                allQuestions: 'Lernrunde beendet! 📚',
                berlin:       'Berlin-Runde beendet! 🏙️',
                mistakes:     'Fehler-Runde beendet! 🔁',
                review:       'Smart Review beendet! 🔁',
                topic:        'Themen-Runde beendet! 📚'
            };
            document.getElementById('endTitle').textContent = titles[state.currentMode] || 'Fertig! 🎉';

            document.getElementById('finalScore').textContent = `${state.correct}/${total}`;
            document.getElementById('scoreMessage').textContent = isExam
                ? `${percent}% richtig beantwortet`
                : `${state.correct} von ${total} Fragen korrekt (${percent}%)`;

            const passFail = document.getElementById('passFail');
            passFail.textContent = '';
            passFail.className = 'pass-fail';
            if (isExam) {
                const passed = state.correct >= 17;
                passFail.textContent = passed ? '✓ Bestanden!' : '✗ Nicht bestanden';
                passFail.classList.add(passed ? 'pass' : 'fail');
            }

            document.getElementById('correctCount').textContent = state.correct;
            document.getElementById('incorrectCount').textContent = state.incorrect;

            // Exam sub-scores: elapsed time, general score, Berlin score, threshold note
            const subScoresEl = document.getElementById('examSubScores');
            if (isExam) {
                const elapsed = state.examStartTime
                    ? Math.round((Date.now() - state.examStartTime) / 1000)
                    : (3600 - state.timeLeft);
                const elapsedMins = Math.floor(elapsed / 60);
                const elapsedSecs = elapsed % 60;
                const elapsedStr = `${elapsedMins}:${String(elapsedSecs).padStart(2, '0')}`;
                subScoresEl.style.display = 'block';
                subScoresEl.innerHTML = `
                    <div class="pass-threshold-note">Bestehensgrenze: 17 von 33 Fragen (52 %)</div>
                    <div class="exam-subscores">
                        <div class="breakdown-item">
                            <div class="breakdown-label">Allgemein (von 30)</div>
                            <div class="breakdown-number" style="color: var(--gold)">${state.generalCorrect}</div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-label">Berlin (von 3)</div>
                            <div class="breakdown-number" style="color: var(--gold)">${state.berlinCorrect}</div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-label">Zeit</div>
                            <div class="breakdown-number" style="color: var(--blue)">${elapsedStr}</div>
                        </div>
                    </div>`;
            } else {
                subScoresEl.style.display = 'none';
            }

            // Wrong-answer review list
            const reviewEl = document.getElementById('reviewSection');
            if (state.missedQuestions.length > 0) {
                reviewEl.innerHTML = `
                    <div class="review-section">
                        <div class="review-section-header">
                            <h2>✗ Falsche Antworten überprüfen</h2>
                            <div style="display:flex;align-items:center;gap:var(--spacing-md);flex-wrap:wrap;">
                                <span style="color: var(--muted); font-size: 0.9rem;">${state.missedQuestions.length} Frage${state.missedQuestions.length !== 1 ? 'n' : ''}</span>
                                <button class="btn-primary" onclick="startMistakeMode()" style="padding:8px 18px;font-size:0.75rem;">🔁 Fehler wiederholen</button>
                            </div>
                        </div>
                        ${state.missedQuestions.map(({ q, userAnswerIdx }) => `
                            <div class="review-item">
                                <div class="review-q-num">Frage ${q.id}</div>
                                <div class="review-q-text">${q.de}</div>
                                <div class="review-answers">
                                    <div class="review-answer user-wrong">✗ ${q.options[userAnswerIdx]}</div>
                                    <div class="review-answer correct-ans">✓ ${q.options[q.correct]}</div>
                                </div>
                                <div class="review-explanation">
                                    ${q.explanation_de}
                                    ${state.showEnglish ? `<div class="review-explanation-en">${q.explanation_en}</div>` : ''}
                                </div>
                            </div>`).join('')}
                    </div>`;
            } else {
                reviewEl.innerHTML = '';
            }

            showScreen('end');
        }

        // ============================================================
        // MISTAKE MODE
        // ============================================================
        function startMistakeMode() {
            const qs = state.missedQuestions.map(m => m.q);
            if (qs.length === 0) return;
            state.currentMode = 'mistakes';
            state.currentQuestions = qs;
            state.currentQuestionIndex = 0;
            state.answered = {};
            state.correct = 0;
            state.incorrect = 0;
            state.showExplanation = false;
            state.missedQuestions = [];
            state.examStartTime = null;
            state.generalCorrect = 0;
            state.berlinCorrect = 0;
            document.getElementById('questionNavWrapper').style.display = 'flex';
            document.getElementById('timer').style.display = 'none';
            showScreen('quiz');
            displayQuestion();
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('darkBtn').addEventListener('click', () => setTheme('dark'));
        document.getElementById('lightBtn').addEventListener('click', () => setTheme('light'));

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (ttsSupported) window.speechSynthesis.cancel();
            state.currentQuestionIndex++;
            state.showExplanation = false;
            if (state.currentQuestionIndex < state.currentQuestions.length) {
                displayQuestion();
            } else {
                endQuiz();
            }
        });

        const _speakBtn = document.getElementById('speakBtn');
        if (_speakBtn) {
            if (!ttsSupported) _speakBtn.style.display = 'none';
            else _speakBtn.addEventListener('click', speakQuestion);
        }

        document.getElementById('bilingualToggle').addEventListener('click', () => {
            state.showEnglish = !state.showEnglish;
            const toggle = document.getElementById('bilingualToggle');
            toggle.textContent = state.showEnglish ? '🌐 DE' : '🌐 EN';
            toggle.title = state.showEnglish ? 'Englisch ausblenden' : 'Auf Englisch anzeigen';
            toggle.classList.toggle('active', state.showEnglish);
            document.getElementById('questionEnglish').classList.toggle('show', state.showEnglish);
            document.getElementById('explanationEnglish').classList.toggle('show', state.showEnglish);
            document.querySelectorAll('.option-en-text').forEach(el => el.classList.toggle('show', state.showEnglish));
        });

        const _navToggle = document.getElementById('questionNavToggle');
        if (_navToggle) _navToggle.addEventListener('click', toggleQuestionNav);

        document.getElementById('backBtn').addEventListener('click', () => {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                displayQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        document.getElementById('quitBtn').addEventListener('click', () => {
            const resumable = state.currentMode !== 'exam' && state.currentMode !== 'mistakes';
            const msg = resumable
                ? 'Quiz beenden und zur Startseite? Du kannst die Sitzung später fortsetzen.'
                : 'Quiz beenden und zur Startseite? Dein Fortschritt in dieser Runde geht verloren.';
            if (confirm(msg)) {
                if (state.timerInterval) clearInterval(state.timerInterval);
                if (ttsSupported) window.speechSynthesis.cancel();
                if (!resumable) clearSession();
                document.getElementById('timer').style.display = 'none';
                renderModes();
                renderTopics();
                renderHistory();
                renderHomeStatus();
                showScreen('home');
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            if (state.currentMode === 'topic') startTopic(state.currentTopic);
            else startMode(state.currentMode);
        });

        document.getElementById('homeBtn').addEventListener('click', () => {
            if (ttsSupported) window.speechSynthesis.cancel();
            renderModes();
            renderTopics();
            renderHistory();
            renderHomeStatus();
            showScreen('home');
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (state.currentScreen !== 'quiz') return;
            const options = Array.from(document.querySelectorAll('.option-btn:not(:disabled)'));
            const nextBtn = document.getElementById('nextBtn');

            if (options.length > 0) {
                const focused = document.activeElement;
                const idx = options.indexOf(focused);
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    options[(idx + 1) % options.length].focus();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    options[(idx - 1 + options.length) % options.length].focus();
                } else if ((e.key === ' ' || e.key === 'Enter') && idx !== -1) {
                    e.preventDefault();
                    focused.click();
                }
            } else if (e.key === 'Enter' && nextBtn.style.display !== 'none') {
                nextBtn.click();
            }
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        // Don't let the browser restore a partial scroll offset after a
        // pull-to-refresh / reload — that would tuck the hero under the
        // sticky header. Always start at the top.
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);
        window.addEventListener('load', () => window.scrollTo(0, 0));
        // PWA resume / bfcache restore: keep the home screen pinned to the top
        // so the hero is never tucked under the sticky header.
        window.addEventListener('pageshow', () => {
            if (state.currentScreen === 'home') window.scrollTo(0, 0);
        });

        loadProgress();
        loadHistory();
        initTheme();

        async function loadQuestions() {
            try {
                const res = await fetch('questions.json', { cache: 'no-cache' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                QUESTIONS = await res.json();
            } catch (e) {
                console.error('Failed to load questions.json', e);
                const grid = document.getElementById('modesGrid');
                if (grid) grid.innerHTML =
                    '<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--red);">' +
                    'Fragen konnten nicht geladen werden. Bitte die Seite über einen Webserver öffnen (nicht per file://) und neu laden.</div>';
                return;
            }
            initHomeScreen();
        }
        loadQuestions();

        document.getElementById('sidebarToggle').addEventListener('click', function() {
            if (window.innerWidth > 720) return;
            const body = document.getElementById('sidebarBody');
            const chevron = document.getElementById('sidebarChevron');
            const expanded = body.classList.toggle('expanded');
            chevron.classList.toggle('open', expanded);
            this.setAttribute('aria-expanded', String(expanded));
        });

        // ---- Service worker (offline / installable PWA) ----
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
